name: Build macOS App

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest   # arm64 Apple Silicon; Tcl 9 + tkinterdnd2 osx-arm64 compatible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build app
        run: pyinstaller -y ImageTools.spec

      - name: Zip .app (preserve symlinks & resource forks)
        run: ditto -c -k --keepParent dist/ImageTools.app dist/ImageTools-macOS.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageTools-macOS
          path: dist/ImageTools-macOS.zip
          retention-days: 30

      # 仅在推送 tag（如 v1.0.0）时创建 GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ImageTools-macOS.zip
          generate_release_notes: true
